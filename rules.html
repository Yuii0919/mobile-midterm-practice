<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考試規則</title>
  <style>
    body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background: #f6f8fc; color: #1f2937; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border: 1px solid #dbe3ef; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    h1, h2 { margin-top: 0; }
    ul { margin: 8px 0 0; padding-left: 18px; }
    li { margin-bottom: 6px; }
    .tag { display: inline-block; background: #eaf1ff; color: #1e3a8a; border-radius: 999px; padding: 2px 10px; margin-right: 8px; font-size: 0.85rem; }
    a { color: #2563eb; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>期中考試規則（整理）</h1>
      <a href="index.html">回首頁</a>
    </div>

    <div class="card">
      <h2>考試資訊</h2>
      <p><span class="tag">複習</span>4/20（一）</p>
      <p><span class="tag">期中考</span>4/21（二）20:15 - 20:50（上機考）</p>
    </div>

    <div class="card">
      <h2>考試範圍</h2>
      <ul>
        <li>Kotlin 基礎</li>
        <li>變數宣告（val / var）</li>
        <li>類型推論</li>
        <li>字串模板</li>
        <li>空值安全（?）</li>
        <li>條件式（if-else、when）</li>
        <li>函式（fun）</li>
        <li>可空值處理（?.、!!）</li>
        <li>CH1 行動裝置與應用開發</li>
        <li>CH2 介面設計與佈局</li>
        <li>CH3 物件監控與事件監聽</li>
      </ul>
    </div>

    <div class="card">
      <h2>題型結構</h2>
      <ul>
        <li>是非題：20 題</li>
        <li>選擇題：30 題</li>
      </ul>
    </div>
  </div>
</body>
</html>
