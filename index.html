<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>期中考練習系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --card: #232d3b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #4ade80;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { position: static !important; border-right: none; border-bottom: 1px solid var(--border); max-height: none; }
    }
    aside {
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100vh;
      overflow: auto;
      padding: 20px 16px;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }
    aside h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 0 0 12px;
      font-weight: 600;
    }
    nav a {
      display: block;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }
    nav a:hover { background: var(--card); color: var(--accent); }
    nav a.current { background: var(--card); color: var(--accent); border: 1px solid var(--border); }
    main { padding: 28px 32px 80px; max-width: 920px; }
    .hero {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .hero p { margin: 0; color: var(--muted); font-size: 0.95rem; }
    .hero a { color: var(--accent); font-weight: 600; margin-left: 6px; }
    .tagline { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .quiz-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      display: inline-block;
      background: var(--surface);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-weight: 500;
      border: 1px solid var(--border);
    }
    button.ctrl {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
    }
    button.ctrl:hover { border-color: var(--accent); color: var(--accent); }
    button.ctrl.primary {
      background: #0ea5e9;
      color: #0f172a;
      border-color: #38bdf8;
    }
    button.ctrl.primary:hover { filter: brightness(1.08); color: #0f172a; }
    button.ctrl:disabled { opacity: 0.45; cursor: not-allowed; }
    .question {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      background: var(--surface);
    }
    .question h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.55;
      color: var(--text);
    }
    .options label {
      display: block;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      color: #cbd5e1;
    }
    .options label:hover { background: rgba(56, 189, 248, 0.08); }
    .options input { margin-right: 8px; accent-color: var(--accent); }
    .result {
      font-weight: 600;
      margin-top: 8px;
      display: none;
      font-size: 0.92rem;
    }
    .result.ok { color: var(--ok); }
    .result.bad { color: var(--bad); }
    code {
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 0.85em;
      background: #0c1014;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h2>導覽</h2>
      <nav>
        <a href="#quiz-top" class="current">題目練習</a>
        <a href="期中考統整.html">期中考統整</a>
        <a href="quiz.html">測驗</a>
        <a href="summary.html">舊版摘要</a>
      </nav>
      <p style="margin-top:22px;font-size:0.8rem;color:var(--muted);line-height:1.55;">
        本頁僅題目與作答；重點請看《期中考統整》。
      </p>
    </aside>
    <main id="quiz-top">
      <header class="hero">
        <h1>期中考練習系統</h1>
        <p>是非與選擇共 <span id="qTotal">0</span> 題，分頁作答（每頁 10 題）。<a href="期中考統整.html">開啟統整重點</a></p>
        <div class="tagline">
          <span class="pill">Ch1–Ch3</span>
          <span class="pill">Kotlin</span>
          <span class="pill">Ch4 提示</span>
        </div>
      </header>

      <div class="quiz-wrap">
        <div class="toolbar">
          <span id="pageInfo" class="badge">第 1 頁 / 共 1 頁</span>
          <span id="scoreInfo" class="badge">已作答 0 題，正確 0 題</span>
          <button type="button" id="prevBtn" class="ctrl">上一頁</button>
          <button type="button" id="nextBtn" class="ctrl">下一頁</button>
          <button type="button" id="checkBtn" class="ctrl primary">檢查本頁答案</button>
          <button type="button" id="resetBtn" class="ctrl">重置作答</button>
        </div>
        <div id="quizContainer"></div>
      </div>
    </main>
  </div>

  <script>
    const questions = [
      { type:"tf", q:"LinearLayout 未設定 orientation 時，預設是水平排列。", answer:"T" },
      { type:"tf", q:"ConstraintLayout 的元件不需要任何約束也能正確定位。", answer:"F" },
      { type:"mc", q:"下列何者通常用於文字大小？", options:["dp","sp","px","mm"], answer:"sp" },
      { type:"mc", q:"在 Android 專案中，版面 XML 通常放在哪個目錄？", options:["res/layout","res/values","java","manifests"], answer:"res/layout" },
      { type:"tf", q:"TextView、Button、EditText 都屬於常見視窗元件。", answer:"T" },
      { type:"mc", q:"RadioGroup 的主要作用是？", options:["儲存圖片","讓多個 RadioButton 形成單選群組","設定字體大小","提供多行輸入"], answer:"讓多個 RadioButton 形成單選群組" },
      { type:"tf", q:"在 MainActivity 中，通常要先 setContentView 再 findViewById。", answer:"T" },
      { type:"mc", q:"設定按鈕點擊事件常用哪個方法？", options:["setOnClickListener","setOnTouchOnly","onButtonStart","bindClickEvent"], answer:"setOnClickListener" },
      { type:"tf", q:"Kotlin 的 val 宣告後可以任意重新指派新值。", answer:"F" },
      { type:"mc", q:"Kotlin 可空型別的寫法是哪個？", options:["Int!","Int?","?Int","Nullable<Int> only"], answer:"Int?" },
      { type:"mc", q:"安全呼叫運算子是哪個？", options:["!!","?.","::","->"], answer:"?." },
      { type:"tf", q:"使用 !! 若變數為 null，可能拋出 NullPointerException。", answer:"T" },
      { type:"mc", q:"多分支條件判斷在 Kotlin 常可用何者提高可讀性？", options:["switch","when","goto","enumOnly"], answer:"when" },
      { type:"tf", q:"Kotlin 的 main() 可以在同一支檔案宣告很多個。", answer:"F" },
      { type:"mc", q:"用來顯示短暫文字提示的元件是？", options:["AlertDialog","Toast","RecyclerView","Fragment"], answer:"Toast" },
      { type:"tf", q:"Toast.makeText(...) 最後通常要呼叫 show() 才會顯示。", answer:"T" },
      { type:"mc", q:"Snackbar 相較 Toast 的常見優勢是？", options:["能附加回應按鈕","一定會全螢幕顯示","只能顯示圖片","不需要 Context"], answer:"能附加回應按鈕" },
      { type:"mc", q:"AlertDialog 若要顯示清單選項可用哪個方法？", options:["setHintList","setItems","setListText","setDialogArray"], answer:"setItems" },
      { type:"tf", q:"AlertDialog 適合需要使用者互動與確認的情境。", answer:"T" },
      { type:"mc", q:"Android 資源 ID（如 R.id.xxx）由哪個類別集中管理？", options:["ResourceManager","R","AndroidRes","IDStore"], answer:"R" },
      { type:"tf", q:"res/values 常放 colors.xml、strings.xml、themes.xml。", answer:"T" },
      { type:"mc", q:"下列何者描述正確？", options:["dp 主要給文字大小","sp 主要給文字大小","px 最適合跨裝置 UI","sp 不受系統字體設定影響"], answer:"sp 主要給文字大小" },
      { type:"tf", q:"FrameLayout 常用於元件堆疊效果。", answer:"T" },
      { type:"mc", q:"ConstraintLayout 中常用 0dp 代表？", options:["隱藏元件","match_constraint","固定 0 寬","透明"], answer:"match_constraint" },
      { type:"tf", q:"android:gravity 用於控制元件本身在父容器的位置。", answer:"F" },
      { type:"mc", q:"哪個屬性常用來設定 EditText 的輸入類型（如密碼）？", options:["hint","inputType","maxLines","drawableEnd"], answer:"inputType" },
      { type:"mc", q:"在猜拳範例中，電腦出拳隨機值範圍為？", options:["1~3","0~2","0~3","-1~1"], answer:"0~2" },
      { type:"tf", q:"Math.random()*3 轉成 Int 後，不可能得到 2。", answer:"F" },
      { type:"mc", q:"若要在字串中插入變數 playerName，常見寫法是？", options:["{playerName}","$playerName","%playerName","#playerName"], answer:"$playerName" },
      { type:"tf", q:"在 Activity 中，onCreate 是生命週期中重要初始化時機。", answer:"T" },
      { type:"tf", q:"AndroidManifest.xml 可宣告 Activity 與應用程式權限。", answer:"T" },
      { type:"mc", q:"應用程式圖示、名稱、主題等通常宣告在 Manifest 的哪個標籤下？", options:["<manifest>","<application>","<activity>","<intent-filter>"], answer:"<application>" },
      { type:"mc", q:"定義 App 啟動時第一個畫面（LAUNCHER）常用？", options:["<service>","<intent-filter> 搭配 MAIN/LAUNCHER","<provider>","<receiver>"], answer:"<intent-filter> 搭配 MAIN/LAUNCHER" },
      { type:"tf", q:"Gradle 用於專案建構與依賴管理。", answer:"T" },
      { type:"mc", q:"圖片資源（png、jpg、vector xml）多放在？", options:["res/mipmap","res/drawable","res/raw","assets/fonts"], answer:"res/drawable" },
      { type:"mc", q:"不同解析度的 App 圖示（launcher icon）常放在？", options:["res/drawable","res/mipmap","res/layout","res/xml"], answer:"res/mipmap" },
      { type:"tf", q:"Activity 常繼承 AppCompatActivity 並使用 AndroidX。", answer:"T" },
      { type:"mc", q:"在 Kotlin 中載入主版面常用？", options:["setContentView(R.layout.activity_main)","loadLayout(\"main\")","inflateActivity()","attachXML()"], answer:"setContentView(R.layout.activity_main)" },
      { type:"tf", q:"layout_margin 描述的是元件外側與其他元件的距離。", answer:"T" },
      { type:"tf", q:"padding 是元件內容與自己邊界之間的內距。", answer:"T" },
      { type:"mc", q:"要讓某個 View 在父 LinearLayout 裡靠右，常用？", options:["android:gravity=\"right\" 設在子 View","android:layout_gravity=\"end\" 設在子 View","android:paddingEnd","android:orientation=\"right\""], answer:"android:layout_gravity=\"end\" 設在子 View" },
      { type:"mc", q:"android:layout_width=\"match_parent\" 表示？", options:["寬度隱藏","寬度盡量填滿父容器","寬度固定 0","寬度由子元件決定"], answer:"寬度盡量填滿父容器" },
      { type:"mc", q:"android:layout_width=\"wrap_content\" 表示？", options:["寬度永遠 0","寬度依內容撐開","寬度等於螢幕寬","寬度由系統隨機"], answer:"寬度依內容撐開" },
      { type:"tf", q:"RelativeLayout 以元件之間的相對位置來排版。", answer:"T" },
      { type:"tf", q:"strings.xml 集中管理字串有助於多語系與維護。", answer:"T" },
      { type:"mc", q:"在 XML 引用字串資源 @string/app_name 時，定義檔通常是？", options:["colors.xml","strings.xml","themes.xml","dimens.xml"], answer:"strings.xml" },
      { type:"tf", q:"dp 會隨使用者系統「字型大小」設定而縮放。", answer:"F" },
      { type:"tf", q:"sp 會隨使用者系統字型大小設定而縮放，適合文字。", answer:"T" },
      { type:"mc", q:"ImageView 載入 drawable 圖片常用屬性？", options:["android:text","android:src","android:hint","android:inputType"], answer:"android:src" },
      { type:"mc", q:"RadioGroup 在 XML 預設選中某一個 RadioButton 可用？", options:["android:checked=\"true\" 在 Group","android:checkedButton","android:defaultItem","android:selectFirst"], answer:"android:checkedButton" },
      { type:"tf", q:"Button 的 android:enabled=\"false\" 時按鈕通常無法點擊。", answer:"T" },
      { type:"mc", q:"EditText 在尚未輸入時顯示灰色提示文字，用？", options:["label","hint","tip","prompt"], answer:"hint" },
      { type:"tf", q:"Selector（狀態選擇器）常用 XML 放在 res/drawable。", answer:"T" },
      { type:"mc", q:"Shape 的 <solid> 主要用來？", options:["設定圓角","設定邊框寬度","設定填充顏色","設定陰影"], answer:"設定填充顏色" },
      { type:"tf", q:"Kotlin 中 var 宣告的變數可以重新指派。", answer:"T" },
      { type:"tf", q:"未加 ? 的 Int 型別變數可以直接指定為 null。", answer:"F" },
      { type:"mc", q:"字串模板 \"總分：${a + b}\" 中 ${a + b} 是？", options:["註解","嵌入運算式","編譯錯誤","字串名稱"], answer:"嵌入運算式" },
      { type:"mc", q:"下列何者較符合「空值安全」習慣？", options:["盡量使用 !!","可空時優先 ?. 再考慮其他寫法","全部用 Any","不要用型別"], answer:"可空時優先 ?. 再考慮其他寫法" },
      { type:"tf", q:"if 在 Kotlin 可以當運算式把結果指派給變數。", answer:"T" },
      { type:"mc", q:"宣告函式關鍵字是？", options:["function","fun","def","fn"], answer:"fun" },
      { type:"mc", q:"單一表達式函式可寫成 fun double(x: Int) = x * 2，此寫法？", options:["錯誤","省略大括號與 return","一定要加 void","只能在 Java"], answer:"省略大括號與 return" },
      { type:"tf", q:"函式參數可以設定預設值，例如 fun f(n: Int = 0)。", answer:"T" },
      { type:"mc", q:"findViewById<TextView>(R.id.tv) 的泛型 <> 用意？", options:["裝飾用","指定回傳的 View 型別","加快編譯","可省略"], answer:"指定回傳的 View 型別" },
      { type:"tf", q:"XML 元件若要在程式中用 findViewById 控制，通常需要 android:id。", answer:"T" },
      { type:"mc", q:"Snackbar 建立時第一個參數常見為？", options:["Application","View（錨點）","只有字串","File"], answer:"View（錨點）" },
      { type:"mc", q:"Toast 持續時間常使用？", options:["Toast.LENGTH_SHORT 或 LENGTH_LONG","Duration.FOREVER","TimeUnit.HOURS","sleep(1000)"], answer:"Toast.LENGTH_SHORT 或 LENGTH_LONG" },
      { type:"tf", q:"AlertDialog.Builder 建立後可鏈式呼叫 setTitle、setMessage 等方法。", answer:"T" },
      { type:"mc", q:"AlertDialog 單選清單常用？", options:["setMultiChoiceItems","setSingleChoiceItems","setGridItems","setRadioXML"], answer:"setSingleChoiceItems" },
      { type:"mc", q:"AlertDialog 的「確定」類按鈕常用？", options:["setNeutralButton","setPositiveButton","setTopButton","setOkOnly"], answer:"setPositiveButton" },
      { type:"tf", q:"Minimum SDK 設越低，代表可支援的舊裝置越多。", answer:"T" },
      { type:"tf", q:"Minimum SDK 設越低，通常越能直接使用所有最新 Android API。", answer:"F" },
      { type:"mc", q:"Android Studio 的 Android 檢視與 Project 檢視差異，下列何者較正確？", options:["完全沒差","Android 檢視以開發角度整理；Project 看實際資料夾","只能選一種","Project 不能開啟"], answer:"Android 檢視以開發角度整理；Project 看實際資料夾" },
      { type:"tf", q:"colors.xml 用來集中定義顏色資源。", answer:"T" },
      { type:"mc", q:"下列哪一組最像「0 分」與「缺考無分數」的語意區分？", options:["都用 0","用 Int 與 Int?（可空）區分","都用 String\"無\"","無法區分"], answer:"用 Int 與 Int?（可空）區分" },
      { type:"tf", q:"?. 左側為 null 時，整串鏈結結果為 null 且不會因此拋 NPE。", answer:"T" },
      { type:"mc", q:"Elvis 運算子 score ?: 0 代表？", options:["score 必為 0","score 為 null 時用 0 替代","score 變成字串","錯誤語法"], answer:"score 為 null 時用 0 替代" },
      { type:"tf", q:"匿名函式可以沒有名稱並賦值給變數。", answer:"T" },
      { type:"mc", q:"setTextSize(TypedValue.COMPLEX_UNIT_SP, 30f) 第二個參數單位？", options:["dp","px","sp","pt"], answer:"sp" },
      { type:"tf", q:"RadioButton 的 checked 可表示目前是否被選取。", answer:"T" },
      { type:"mc", q:"Android 套件名稱（package）主要在何處宣告？", options:["僅在 Kotlin 檔第一行","AndroidManifest 與 Gradle 等設定","只在 strings.xml","不需宣告"], answer:"AndroidManifest 與 Gradle 等設定" },
      { type:"tf", q:"ConstraintLayout 每個子元件至少需一個水平與一個垂直約束。", answer:"T" },
      { type:"mc", q:"LinearLayout orientation=\"vertical\" 時子元件排列方向？", options:["由左到右","由右到左","由上到下","重疊"], answer:"由上到下" },
      { type:"tf", q:"Button 的 textAllCaps 可控制文字是否強制全大寫。", answer:"T" },
      { type:"mc", q:"Snackbar 若希望使用者可點「復原」這類動作，常用？", options:["setTitle","setAction","setIcon","setMenu"], answer:"setAction" },
      { type:"tf", q:"dimens.xml 可用來集中管理間距與尺寸數值。", answer:"T" },
      { type:"mc", q:"下列何者不是 Android 常見佈局？", options:["LinearLayout","ConstraintLayout","FrameLayout","FlowDocumentLayout"], answer:"FlowDocumentLayout" },
      { type:"tf", q:"Service 也可以在 AndroidManifest.xml 中宣告。", answer:"T" },
      { type:"mc", q:"Kotlin 靜態型別代表？", options:["執行時型別一直變","編譯期就決定型別","不需要型別","只有字串有型別"], answer:"編譯期就決定型別" },
      { type:"tf", q:"when 的分支可用 -> 連接條件與回傳值。", answer:"T" }
    ];

    document.getElementById("qTotal").textContent = String(questions.length);

    const pageSize = 10;
    const totalPages = Math.ceil(questions.length / pageSize);
    let currentPage = 1;
    const userAnswers = {};
    const checkedState = {};
    const quizContainer = document.getElementById("quizContainer");
    const pageInfo = document.getElementById("pageInfo");
    const scoreInfo = document.getElementById("scoreInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");

    function renderPage() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageQuestions = questions.slice(start, end);
      quizContainer.innerHTML = "";
      pageQuestions.forEach((item, idx) => {
        const realIndex = start + idx;
        const wrap = document.createElement("div");
        wrap.className = "question";
        const title = document.createElement("h3");
        title.textContent = `${realIndex + 1}. ${item.q}`;
        wrap.appendChild(title);
        const optionsBox = document.createElement("div");
        optionsBox.className = "options";
        const options = item.type === "tf" ? ["T", "F"] : item.options;
        options.forEach((opt) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = `q_${realIndex}`;
          input.value = opt;
          if (userAnswers[realIndex] === opt) input.checked = true;
          input.addEventListener("change", () => { userAnswers[realIndex] = opt; updateScore(); });
          label.appendChild(input);
          label.appendChild(document.createTextNode(item.type === "tf" ? (opt === "T" ? "是" : "否") : opt));
          optionsBox.appendChild(label);
        });
        wrap.appendChild(optionsBox);
        const result = document.createElement("div");
        result.className = "result";
        if (checkedState[realIndex]) {
          const ok = userAnswers[realIndex] === item.answer;
          result.style.display = "block";
          result.classList.add(ok ? "ok" : "bad");
          result.textContent = ok ? "答對" : `答錯，正確答案：${item.type === "tf" ? (item.answer === "T" ? "是" : "否") : item.answer}`;
        }
        wrap.appendChild(result);
        quizContainer.appendChild(wrap);
      });
      pageInfo.textContent = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }
    function updateScore() {
      let answered = 0, correct = 0;
      questions.forEach((q, i) => {
        if (userAnswers[i] !== undefined) { answered++; if (userAnswers[i] === q.answer) correct++; }
      });
      scoreInfo.textContent = `已作答 ${answered} 題，正確 ${correct} 題`;
    }
    prevBtn.addEventListener("click", () => { if (currentPage > 1) { currentPage--; renderPage(); } });
    nextBtn.addEventListener("click", () => { if (currentPage < totalPages) { currentPage++; renderPage(); } });
    checkBtn.addEventListener("click", () => {
      const start = (currentPage - 1) * pageSize;
      const end = Math.min(start + pageSize, questions.length);
      for (let i = start; i < end; i++) checkedState[i] = true;
      renderPage();
      updateScore();
    });
    resetBtn.addEventListener("click", () => {
      Object.keys(userAnswers).forEach((k) => delete userAnswers[k]);
      Object.keys(checkedState).forEach((k) => delete checkedState[k]);
      currentPage = 1;
      renderPage();
      updateScore();
    });
    renderPage();
    updateScore();
  </script>
</body>
</html>
